<!-- ═══ Type = With Line ═══ -->
@if (type() === 'line') {
  <div class="cb cb--line">
    <div class="cb__code">
      @for (line of lines(); track line.lineNumber) {
        <app-code-line
          [highlight]="line.highlight"
          [showLineNumber]="line.showLineNumber"
          [lineNumber]="line.lineNumber"
          [code]="line.code"
          [indentLevel]="line.indentLevel"
        />
      }
    </div>
  </div>
}

<!-- ═══ Type = Documentation (Expanded or Collapsed) ═══ -->
@if (type() === 'doc-expanded' || type() === 'doc-collapsed') {
  <div
    class="cb cb--doc"
    [class.cb--doc-collapsed]="type() === 'doc-collapsed'"
    [class.cb--doc-no-content]="type() === 'doc-collapsed' || !isExpanded()"
  >
    <!-- Toolbar — always visible -->
    <div class="cb__toolbar">
      <app-code-link
        [size]="resolvedShowCodeLink().size"
        [variant]="resolvedShowCodeLink().style"
        [state]="resolvedShowCodeLink().state"
        [showTrailingIcon]="resolvedShowCodeLink().showTrailingIcon"
        [showLabel]="resolvedShowCodeLink().showLabel"
        [label]="resolvedShowCodeLink().label"
        [icon]="resolvedShowCodeLink().icon"
        [iconRotated]="isExpanded() && type() !== 'doc-collapsed'"
        [style.margin-left.px]="indentPx()"
        (pressed)="toggleCode()"
      />

      <div class="cb__actions">
        <app-code-link
          [size]="resolvedCopyLink().size"
          [variant]="isCopied() ? 'subtle' : resolvedCopyLink().style"
          [state]="resolvedCopyLink().state"
          [showTrailingIcon]="resolvedCopyLink().showTrailingIcon"
          [showLabel]="resolvedCopyLink().showLabel"
          [label]="resolvedCopyLink().label"
          [icon]="resolvedCopyLink().icon"
          (pressed)="copyCode()"
        />
        <app-code-link
          [size]="resolvedEditLink().size"
          [variant]="resolvedEditLink().style"
          [state]="resolvedEditLink().state"
          [showTrailingIcon]="resolvedEditLink().showTrailingIcon"
          [showLabel]="resolvedEditLink().showLabel"
          [label]="resolvedEditLink().label"
          [icon]="resolvedEditLink().icon"
        />
      </div>
    </div>

    <!-- Expandable content (doc-expanded only) -->
    @if (isExpanded() && type() === 'doc-expanded') {
      <!-- Tab group -->
      @if (codeTabs().length) {
        <app-code-tab-group
          [type]="resolvedTabGroup().type"
          [orientation]="resolvedTabGroup().orientation"
          [tabs]="resolvedTabGroup().tabs"
          [activeIndex]="activeTabIndex()"
          (tabSelected)="onTabSelected($event)"
        />
      }

      <div class="cb__code cb__code--doc">
        @for (line of lines(); track line.lineNumber) {
          <app-code-line
            [highlight]="line.highlight"
            [showLineNumber]="line.showLineNumber"
            [lineNumber]="line.lineNumber"
            [code]="line.code"
            [indentLevel]="line.indentLevel"
          />
        }
      </div>
    }
  </div>
}
