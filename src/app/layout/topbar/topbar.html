<header class="ms-topbar">
  <!-- Left: hamburger + title -->
  <div class="ms-topbar__left">
    <button class="ms-topbar__hamburger" (click)="toggleSidebar()">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path
          d="M3 4.5h12M3 9h12M3 13.5h12"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
        />
      </svg>
    </button>
    <h1 class="ms-topbar__title">{{ pageTitle() }}</h1>
  </div>

  <!-- Right: search + theme toggle + settings -->
  <div class="ms-topbar__right">
    <div class="ms-topbar__search">
      <svg class="ms-topbar__search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none">
        <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.5" />
        <path
          d="M9.5 9.5L12.5 12.5"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
        />
      </svg>
      <input class="ms-topbar__search-input" type="text" placeholder="Search..." />
    </div>

    <button class="ms-topbar__icon-btn" (click)="toggleTheme()" title="Toggle dark mode">
      @if (isDark) {
        <!-- Sun icon -->
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="9" r="3.5" stroke="currentColor" stroke-width="1.3" />
          <path
            d="M9 2v1.5M9 14.5V16M2 9h1.5M14.5 9H16M4.05 4.05l1.06 1.06M12.89 12.89l1.06 1.06M4.05 13.95l1.06-1.06M12.89 5.11l1.06-1.06"
            stroke="currentColor"
            stroke-width="1.3"
            stroke-linecap="round"
          />
        </svg>
      } @else {
        <!-- Moon icon -->
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path
            d="M15.1 10.4A6.5 6.5 0 017.6 2.9a6.5 6.5 0 107.5 7.5z"
            stroke="currentColor"
            stroke-width="1.3"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      }
    </button>
  </div>
</header>
