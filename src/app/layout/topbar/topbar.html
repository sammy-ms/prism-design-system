<header class="ms-topbar">
  <!-- Left: hamburger + title -->
  <div class="ms-topbar__left">
    <button class="ms-topbar__hamburger" (click)="toggleSidebar()">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path
          d="M3 4.5h12M3 9h12M3 13.5h12"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
        />
      </svg>
    </button>
    <h1 class="ms-topbar__title">{{ pageTitle() }}</h1>
  </div>

  <!-- Right: search + theme toggle + settings -->
  <div class="ms-topbar__right">
    <div class="ms-topbar__search">
      <svg
        class="ms-topbar__search-icon"
        width="14"
        height="14"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M3 10a7 7 0 1 0 14 0a7 7 0 1 0 -14 0" />
        <path d="M21 21l-6 -6" />
      </svg>
      <input class="ms-topbar__search-input" type="text" placeholder="Search..." />
    </div>

    <button class="ms-topbar__icon-btn" title="Toggle dark mode">
      @if (isDark) {
        <!-- Sun icon (light-mode) -->
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M8 12a4 4 0 1 0 8 0a4 4 0 1 0 -8 0" />
          <path
            d="M3 12h1m8 -9v1m8 8h1m-9 8v1m-6.4 -15.4l.7 .7m12.1 -.7l-.7 .7m0 11.4l.7 .7m-12.1 -.7l-.7 .7"
          />
        </svg>
      } @else {
        <!-- Moon icon (dark-mode) -->
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446a9 9 0 1 1 -8.313 -12.454l0 .008"
          />
        </svg>
      }
    </button>
  </div>
</header>
