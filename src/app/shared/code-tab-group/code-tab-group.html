<div
  class="ctg"
  [class.ctg--underline]="type() === 'underline'"
  [class.ctg--white-pill]="type() === 'white-pill'"
  [class.ctg--grey-pill]="type() === 'grey-pill'"
  [class.ctg--vertical]="orientation() === 'vertical'"
>
  @for (entry of visibleTabEntries(); track entry.index) {
    <button
      [class]="getTabClasses(entry.tab, entry.index)"
      [disabled]="entry.tab.state === 'disabled'"
      (click)="onSelect(entry.index, entry.tab)"
    >
      @if (entry.tab.showLabel) {
        <span class="ctg__label">{{ entry.tab.label }}</span>
      }
      @if (entry.tab.showTrailingIcon) {
        <svg
          class="ctg__icon"
          width="12"
          height="12"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M9 6l6 6l-6 6" />
        </svg>
      }
    </button>
  }
</div>
